name: CilekDozlama
options:
  bundleIdPrefix: com.cilek
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
targets:
  CilekDozlama:
    type: application
    platform: iOS
    sources:
      - CilekDozlama
    info:
      path: CilekDozlama/Info.plist
      properties:
        CFBundleDisplayName: Çilek Dozlama
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocalNetworkUsageDescription: "Yerel ağdaki yerel sunucuya (REST) bağlanmak için kullanılır."
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cilek.dozlama
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: NO
